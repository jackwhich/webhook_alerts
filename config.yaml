server:
  host: 0.0.0.0
  port: 9600

logging:
  log_dir: "logs"
  log_file: "webhook_alerts.log"
  level: "INFO"
  max_bytes: 10485760
  backup_count: 5

# 全局代理开关（控制是否使用代理）
# true: 启用代理（默认）
# false: 禁用代理（所有渠道都不使用代理）
proxy_enabled: true

proxy:
  http: "socks5://x.8.x.x:33080"
  https: "socks5://x.8.x.x:33080"

# Prometheus 告警趋势图（Go 版使用 vicanso/go-charts 出图，兼容 VictoriaMetrics）
prometheus_image:
  enabled: true
  # prometheus_url: Prometheus 或 VM 的 API 地址。VM 集群需带 path 如 .../select/0/prometheus，单机 :8428，Prometheus :9090。
  # vmalert 出图需配 -external.alert.source 将 g0.expr 写入 generatorURL，详见 README。
  prometheus_url: "http://x.x.x.x:9090"
  # 请求 Prometheus/VM 时是否走代理（默认 false，内网可不配）
  use_proxy: false
  lookback_minutes: 15
  step: "30s"
  timeout_seconds: 8
  max_series: 8
  # 图例标签白名单：仅以下 label 会出现在趋势图图例中（Go 版当前图例由 metric 标签生成，此列表预留兼容）
  legend_label_whitelist:
    # K8s/容器
    - pod
    - container
    - namespace
    - deployment
    - statefulset
    - daemonset
    - job_name
    - horizontalpodautoscaler
    - persistentvolumeclaim
    - persistentvolume
    - phase
    # 节点/磁盘
    - device
    - mountpoint
    - fstype
    - instance
    - node
    # Kafka（积压/分区数/broker/副本 等）
    - topic
    - consumergroup
    - name
    - address
    # RocketMQ（积压/消费延时/broker/TPS 等）
    - group
    - broker
    - brokerIP
    - cluster
    - env
    # RPC/服务/Dubbo/Hikaricp
    - service_name
    - endpoint
    - application
    # Jenkins
    - jenkins_job
    - build_number
    # Nginx（4XX/5XX/uri/源IP 等）
    - server_name
    - status
    - uri
    - request_uri
    - remote_addr
    - url
    # Prometheus/Alertmanager
    - alertmanager
    - remote_name
    - controller
    - resource
    # Nacos（节点宕机/CPU 等，nacos_monitor 用 name、kubernetes_namespace）
    - kubernetes_namespace
    # 通用/TargetDown 等
    - service
# Grafana 告警趋势图（Go 版暂未实现，保留配置兼容）
grafana_image:
  enabled: false
  grafana_url: "http://x.x.x.x:xxxx"
  grafana_api_token: "xxxxxxxx"
  # prometheus_url: 可选，Grafana 使用 Prometheus 数据源时填写
  use_proxy: false
  lookback_minutes: 15
  step: "30s"
  timeout_seconds: 8
  max_series: 8

jenkins_dedup:
  enabled: true
  ttl_seconds: 900
  clear_on_resolved: true

# Grafana 告警去重：同一告警（fingerprint+状态）在窗口内只发一次，避免重复两条
grafana_dedup:
  enabled: true
  ttl_seconds: 90
  clear_on_resolved: true

defaults:
  title_prefix: "[ALERT]"
  dashboard_fallback: ""
  runbook_fallback: ""

# 渠道配置说明：命名规范 = 来源_渠道_用途
# - 来源：prometheus、grafana（谁发的告警）
# - 渠道：telegram、slack（发到哪里）
# - 用途：default、critical、warning、jenkins 等

channels:
  # Prometheus 告警渠道
  prometheus_telegram_default:
    type: telegram
    enabled: true
    image_enabled: true
    bot_token: "xxxxx:xxxxx-xxxxxx"
    chat_id: "-xxxxxx"
    template: "prometheus_telegram.html.tmpl"

  prometheus_telegram_critical:
    type: telegram
    enabled: false
    image_enabled: false
    bot_token: "123456:AAxxxx"
    chat_id: "-xxxxx"
    template: "prometheus_telegram.html.tmpl"

  prometheus_slack:
    type: slack
    enabled: true
    image_enabled: true
    webhook_url: "https://hooks.slack.com/services/Txxxxxxxxx/xxxxxx"
    template: "prometheus_slack.json.tmpl"

  # Grafana 告警渠道
  grafana_telegram_default:
    type: telegram
    enabled: true
    image_enabled: false
    bot_token: "8502571186:AAFqy849KL-xxxxxxx"
    chat_id: "-xxxxx"
    template: "grafana_telegram.html.tmpl"

  # 提币监控告警-人工审核告警-订单进入人工审核
  grafana_risk_withdrawal_order_telegram_default:
    type: telegram
    enabled: true
    image_enabled: false
    bot_token: "xxxxx:AAFqy849KL-YdNykyE7KcPvYpoCRpNYH4Mc"
    chat_id: "-xxx"
    template: "grafana_telegram.html.tmpl"

  grafana_telegram_critical:
    type: telegram
    enabled: false
    image_enabled: false
    bot_token: "xxxx:xxxxx"
    chat_id: "-51345xxx33386"
    template: "grafana_telegram.html.tmpl"

  grafana_slack:
    type: slack
    enabled: false
    webhook_url: "https://hooks.slack.com/services/T000/B000/YYY"
    template: "grafana_slack.json.tmpl"

  # Jenkins 告警渠道
  prometheus_telegram_jenkins:
    # Jenkins 渠道关闭趋势图
    # Jenkins 告警只发送 firing，不发送 resolved
    type: telegram
    enabled: true
    image_enabled: false
    bot_token: "xxxx:xx-xxxxx"
    chat_id: "-xxxxx"
    template: "prometheus_telegram_jenkins.html.tmpl"
    send_resolved: false

# 路由：先识别来源（Grafana version 1 / Prometheus version 4），再按 _receiver、alertname、severity/级别 匹配；支持中文（如 "严重"、"灾难"）；无匹配则不发送
routing:
  - match:
      _receiver: "Prometheus"
    send_to: ["prometheus_telegram_default"]

  - match:
      _receiver: "Prometheus"
      alertname: "^(?!Jenkins|jenkins).*"
      severity: "critical|灾难"
    send_to: ["prometheus_telegram_critical"]

  - match:
      _receiver: "prod-ebpay"
    send_to: ["prometheus_slack"]

  - match:
      _receiver: "prod_ebpay_jenkins_alarm"
      alertname: ".*Jenkins.*|.*jenkins.*"
    send_to: ["prometheus_telegram_jenkins"]

  - match:
      _receiver: "Withdrawal_Monitoring_Review_Manual_Review_Orders_Entering_Manual_Review"
    send_to: ["grafana_risk_withdrawal_order_telegram_default"]
